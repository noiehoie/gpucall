services:
  gpucall:
    build:
      context: .
      args:
        GPUCALL_GIT_COMMIT: ${GPUCALL_GIT_COMMIT:-}
    user: "${GPUCALL_UID:-1000}:${GPUCALL_GID:-1000}"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    ports:
      - "${GPUCALL_BIND_ADDRESS:-127.0.0.1}:18088:8080"
    environment:
      HOME: /config
      PYTHONDONTWRITEBYTECODE: "1"
      GPUCALL_CREDENTIALS: /config/credentials.yml
      GPUCALL_DATABASE_URL: postgresql://${GPUCALL_POSTGRES_USER:-gpucall}:${GPUCALL_POSTGRES_PASSWORD:?set GPUCALL_POSTGRES_PASSWORD}@postgres:5432/${GPUCALL_POSTGRES_DB:-gpucall}
      GPUCALL_GIT_COMMIT: ${GPUCALL_GIT_COMMIT:-}
      GPUCALL_STATE_DIR: /state
      XDG_CACHE_HOME: /cache
      GPUCALL_API_KEYS: ${GPUCALL_API_KEYS:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      GPUCALL_MODAL_APP: ${GPUCALL_MODAL_APP:-}
      GPUCALL_MODAL_FN: ${GPUCALL_MODAL_FN:-}
      GPUCALL_MODAL_STREAM_FN: ${GPUCALL_MODAL_STREAM_FN:-}
      GPUCALL_RUNPOD_API_KEY: ${GPUCALL_RUNPOD_API_KEY:-}
      GPUCALL_RUNPOD_ENDPOINT_ID: ${GPUCALL_RUNPOD_ENDPOINT_ID:-}
      GPUCALL_MAX_FALLBACK_ATTEMPTS: ${GPUCALL_MAX_FALLBACK_ATTEMPTS:-}
      GPUCALL_MAX_PROVIDER_FAMILY_ATTEMPTS: ${GPUCALL_MAX_PROVIDER_FAMILY_ATTEMPTS:-}
      GPUCALL_PROVIDER_TEMPORARY_COOLDOWN_SECONDS: ${GPUCALL_PROVIDER_TEMPORARY_COOLDOWN_SECONDS:-}
      GPUCALL_ADMISSION_WAIT_SECONDS: ${GPUCALL_ADMISSION_WAIT_SECONDS:-}
      GPUCALL_TUPLE_CONCURRENCY_LIMIT: ${GPUCALL_TUPLE_CONCURRENCY_LIMIT:-}
      GPUCALL_PROVIDER_FAMILY_CONCURRENCY_LIMIT: ${GPUCALL_PROVIDER_FAMILY_CONCURRENCY_LIMIT:-}
      GPUCALL_WORKLOAD_SCOPE_CONCURRENCY_LIMIT: ${GPUCALL_WORKLOAD_SCOPE_CONCURRENCY_LIMIT:-}
      GPUCALL_HYPERSTACK_SSH_KEY_PATH: ${GPUCALL_HYPERSTACK_SSH_KEY_PATH:-/config/gpucall_hyperstack_ed25519}
      GPUCALL_HYPERSTACK_KNOWN_HOSTS: ${GPUCALL_HYPERSTACK_KNOWN_HOSTS:-}
      GPUCALL_HYPERSTACK_SSH_TOFU: ${GPUCALL_HYPERSTACK_SSH_TOFU:-}
    volumes:
      - ${GPUCALL_CONFIG_DIR:-./config}:/config
      - ${GPUCALL_STATE_DIR:-./state}:/state
      - ${GPUCALL_CACHE_DIR:-./cache}:/cache
      - ${GPUCALL_MODAL_CONFIG_FILE:-/dev/null}:/config/.modal.toml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GPUCALL_POSTGRES_DB:-gpucall}
      POSTGRES_USER: ${GPUCALL_POSTGRES_USER:-gpucall}
      POSTGRES_PASSWORD: ${GPUCALL_POSTGRES_PASSWORD:?set GPUCALL_POSTGRES_PASSWORD}
    volumes:
      - gpucall-postgres:/var/lib/postgresql/data
      - ./deploy/postgres/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gpucall-postgres:

name: local-echo
kind: controlled_runtime
runtime_boundary: gateway_host
network_scope: localhost
operator_controlled: true
endpoint: null
adapter: echo
model: null
max_model_len: 32768
input_contracts:
  - text
  - chat_messages
  - data_refs
max_data_classification: confidential
trust_profile:
  security_tier: local
  sovereign_jurisdiction: local
  dedicated_gpu: true
  requires_attestation: false
  supports_key_release: false
  allows_worker_s3_credentials: false
routing:
  enabled: false
  preference: last_resort
  allowed_tasks:
    - infer
  allowed_modes:
    - sync
    - async
    - stream
  require_validation_evidence: false
health:
  check_url: null
  timeout_seconds: 2
  failure_policy: warn_only
discovery:
  source: manual
  last_verified_at: '2026-05-10T00:00:00+00:00'

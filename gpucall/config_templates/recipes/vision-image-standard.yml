name: vision-image-standard
task: vision
auto_select: true
data_classification: confidential
allowed_modes:
  - sync
  - async
min_vram_gb: 24
max_model_len: 512
timeout_seconds: 600
lease_ttl_seconds: 900
tokenizer_family: qwen
gpu: any
max_input_bytes: 16777216
allowed_mime_prefixes:
  - image/
allowed_inline_mime_prefixes:
  - text/
default_temperature: 0.2
structured_temperature: 0.0
structured_system_prompt: "Return only valid JSON when response_format requests JSON. Do not include markdown fences or prose."
system_prompt: "Answer the user's vision request directly from the supplied image and prompt."
stop_tokens:
  - "<|im_end|>"
  - "<|endoftext|>"
repetition_penalty: 1.05
guided_decoding: true
output_validation_attempts: 1

required_model_capabilities:
  - visual_question_answering
  - image_captioning
output_contract: plain-text

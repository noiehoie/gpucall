name: text-infer-standard
recipe_schema_version: 2
task: infer
intent: standard_text_inference
data_classification: confidential
allowed_modes:
- sync
- async
context_budget_tokens: 32768
resource_class: standard
latency_class: standard
quality_floor: standard
timeout_seconds: 180
lease_ttl_seconds: 240
tokenizer_family: qwen
max_input_bytes: 16777216
allowed_mime_prefixes:
- text/
default_temperature: 0.7
structured_temperature: 0.0
structured_system_prompt: Return only valid JSON when response_format requests JSON.
  Do not include markdown fences or prose.
system_prompt: Answer the user's request directly.
stop_tokens:
- <|im_end|>
- <|endoftext|>
repetition_penalty: 1.05
guided_decoding: true
output_validation_attempts: 2
required_model_capabilities:
- instruction_following
output_contract: plain-text

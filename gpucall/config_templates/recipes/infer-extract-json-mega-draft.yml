name: infer-extract-json-mega-draft
recipe_schema_version: 3
task: infer
intent: extract_json
auto_select: false
data_classification: confidential
allowed_modes:
- async
context_budget_tokens: 2097152
resource_class: ultralong
latency_class: long_running
quality_floor: draft
timeout_seconds: 600
lease_ttl_seconds: 900
token_estimation_profile: generic_utf8

worker_ref: runpod-vllm-a40-llama-3-2-1b-instruct
adapter: runpod-vllm-serverless
execution_surface: managed_endpoint
model_ref: llama-3.2-1b-instruct
engine_ref: runpod-vllm-openai
modes:
- sync
- async
input_contracts:
- chat_messages
output_contract: openai-chat-completions
stream_contract: none
target: RUNPOD_ENDPOINT_ID_PLACEHOLDER
endpoint_contract: openai-chat-completions
model: meta-llama/Llama-3.2-1B-Instruct
provider_params:
  model_storage:
    storage_kind: runpod_cached_model
    cached_model_ref: meta-llama/Llama-3.2-1B-Instruct
    mount_path: /runpod-volume
    cache_hit_required: true
  worker_env:
    MODEL_NAME: meta-llama/Llama-3.2-1B-Instruct
    OPENAI_SERVED_MODEL_NAME_OVERRIDE: meta-llama/Llama-3.2-1B-Instruct
    MAX_MODEL_LEN: '131072'
    BASE_PATH: /runpod-volume
    GPU_MEMORY_UTILIZATION: '0.95'
    MAX_CONCURRENCY: '30'

name: runpod-vllm-serverless
adapter: runpod-vllm-serverless
max_data_classification: confidential
gpu: AMPERE_16
vram_gb: 16
max_model_len: 8192
cost_per_second: 0.00045
scaledown_window_seconds: 5
min_billable_seconds: 1
billing_granularity_seconds: 1
modes:
  - sync
  - async
endpoint: null
target: RUNPOD_ENDPOINT_ID_PLACEHOLDER
image: runpod/worker-v1-vllm:v2.18.1
endpoint_contract: openai-chat-completions
model: Qwen/Qwen2.5-1.5B-Instruct
provider_params:
  worker_env:
    MODEL_NAME: Qwen/Qwen2.5-1.5B-Instruct
    OPENAI_SERVED_MODEL_NAME_OVERRIDE: Qwen/Qwen2.5-1.5B-Instruct
    MAX_MODEL_LEN: "8192"
    GPU_MEMORY_UTILIZATION: "0.95"
    MAX_CONCURRENCY: "30"
model_ref: qwen2.5-1.5b-instruct
engine_ref: runpod-vllm-openai
input_contracts:
  - chat_messages
output_contract: openai-chat-completions
stream_contract: none

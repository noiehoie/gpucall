name: local-echo
adapter: echo
max_data_classification: confidential
trust_profile:
  security_tier: local
  sovereign_jurisdiction: local
  dedicated_gpu: true
  requires_attestation: false
  supports_key_release: false
  allows_worker_s3_credentials: false
gpu: L4
vram_gb: 24
max_model_len: 32768
cost_per_second: 0
expected_cold_start_seconds: null
scaledown_window_seconds: 0
min_billable_seconds: 0
billing_granularity_seconds: 0
modes: [sync, async, stream]
endpoint: null
input_contracts: [text, chat_messages, data_refs]
output_contract: gpucall-provider-result
stream_contract: token-incremental

model_ref: local-echo-model
engine_ref: local-echo-engine

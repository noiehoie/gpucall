name: vision-image-standard
recipe_schema_version: 3
task: vision
intent: understand_image
auto_select: true
data_classification: confidential
allowed_modes:
- sync
- async
context_budget_tokens: 512
resource_class: standard
latency_class: standard
quality_floor: standard
timeout_seconds: 600
lease_ttl_seconds: 900
token_estimation_profile: generic_utf8
max_input_bytes: 16777216
allowed_mime_prefixes:
- image/
allowed_inline_mime_prefixes:
- text/
default_temperature: 0.2
structured_temperature: 0.0
structured_system_prompt: Return only valid JSON when response_format requests JSON.
  Do not include markdown fences or prose.
system_prompt: Answer the user's vision request directly from the supplied image and
  prompt.
stop_tokens:
- <|im_end|>
- <|endoftext|>
repetition_penalty: 1.05
guided_decoding: true
output_validation_attempts: 1
required_model_capabilities:
- visual_question_answering
- image_captioning
output_contract: plain-text

  worker_env:
    MODEL_NAME: google/gemma-3-27b-it
    OPENAI_SERVED_MODEL_NAME_OVERRIDE: google/gemma-3-27b-it
    MAX_MODEL_LEN: '131072'
    BASE_PATH: /runpod-volume
    GPU_MEMORY_UTILIZATION: '0.95'
    MAX_CONCURRENCY: '30'

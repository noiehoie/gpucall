worker_ref: runpod-vllm-h100-80gb-qwen2-5-7b-instruct
adapter: runpod-vllm-serverless
execution_surface: managed_endpoint
model_ref: qwen2.5-7b-instruct
engine_ref: runpod-vllm-openai
modes:
- sync
- async
input_contracts:
- chat_messages
- text
output_contract: openai-chat-completions
stream_contract: none
target: RUNPOD_ENDPOINT_ID_PLACEHOLDER
endpoint_contract: openai-chat-completions
model: Qwen/Qwen2.5-7B-Instruct
provider_params:
  model_storage:
    storage_kind: runpod_cached_model
    cached_model_ref: Qwen/Qwen2.5-7B-Instruct
    mount_path: /runpod-volume
    cache_hit_required: true
  worker_env:
    MODEL_NAME: Qwen/Qwen2.5-7B-Instruct
    OPENAI_SERVED_MODEL_NAME_OVERRIDE: Qwen/Qwen2.5-7B-Instruct
    MAX_MODEL_LEN: '131072'
    ROPE_SCALING: '{"factor":4.0,"original_max_position_embeddings":32768,"type":"yarn"}'
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'
    BASE_PATH: /runpod-volume
    GPU_MEMORY_UTILIZATION: '0.92'
    ENFORCE_EAGER: 'true'
    MAX_CONCURRENCY: '1'
    MAX_NUM_SEQS: '1'
    ENABLE_CHUNKED_PREFILL: 'true'
    MAX_NUM_BATCHED_TOKENS: '131072'
    DISABLE_LOG_REQUESTS: 'true'
    DISABLE_LOG_STATS: 'true'

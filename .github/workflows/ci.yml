name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gateway-tests:
    name: gateway tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install ripgrep (used by the release-audit tests)
        run: sudo apt-get update -q && sudo apt-get install -y -q ripgrep
      - name: Sync dependencies (all extras)
        run: uv sync --all-extras
      - name: Run full test suite
        run: uv run pytest -q

  sdk-tests:
    name: sdk tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Sync SDK dependencies
        working-directory: sdk/python
        run: uv sync --extra dev
      - name: Run SDK test suite
        working-directory: sdk/python
        run: uv run pytest -q

  product-gates:
    name: config, secrets, conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Sync dependencies (all extras)
        run: uv sync --all-extras
      - name: Validate shipped configuration
        run: uv run gpucall validate-config --config-dir config
      - name: Scan for committed secrets
        run: uv run gpucall security scan-secrets
      - name: Provider adapter conformance
        run: uv run gpucall provider-conformance
      - name: Static launch check
        run: uv run gpucall launch-check --profile static --config-dir config
      - name: Install ripgrep (used by contamination guard)
        run: sudo apt-get update -q && sudo apt-get install -y -q ripgrep
      - name: Product contamination guard
        run: scripts/check_product_contamination.sh
      - name: Provider parity guard
        run: uv run python scripts/check_provider_parity.py

groups:
  - name: gpucall
    rules:
      - alert: GPUCallHigh5xxRate
        expr: sum(rate(gpucall_request_total{status=~"5.."}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: gpucall gateway 5xx rate is elevated
      - alert: GPUCallNoTraffic
        expr: sum(rate(gpucall_request_total[15m])) == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: gpucall gateway has no observed request traffic
